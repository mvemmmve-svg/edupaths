<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="EduPaths - Discover your future career">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="EduPaths">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>EduPaths</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body{margin:0;background:#f8f9ff;}
    #loading{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,sans-serif;color:#2E3B7C;background:#f8f9ff;}
    .sp{width:48px;height:48px;border:4px solid #e0e4ff;border-top-color:#2E3B7C;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div id="loading">
    <div class="sp"></div>
    <div style="font-weight:900;font-size:22px">EduPaths</div>
    <div style="font-size:13px;margin-top:8px;color:#888">Loading your future...</div>
  </div>
  <script>
    var serviceWorkerVersion = {{flutter_service_worker_version}};
    function hide(){var l=document.getElementById('loading');if(l)l.style.display='none';}
    var s=document.createElement('script');
    s.src='flutter_bootstrap.js';
    s.async=true;
    s.onload=hide;
    s.onerror=function(){
      var s2=document.createElement('script');
      s2.src='flutter.js';
      s2.defer=true;
      s2.onload=function(){
        window.addEventListener('load',function(){
          _flutter.loader.load({
            serviceWorkerSettings:{serviceWorkerVersion:serviceWorkerVersion},
            onEntrypointLoaded:function(e){
              e.initializeEngine().then(function(r){hide();r.runApp();});
            }
          });
        });
      };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  </script>
</body>
</html>
