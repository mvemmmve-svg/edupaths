name: edupaths
description: Discover your future. Plan your path. Achieve your goals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Required for usePathUrlStrategy() — without it Flutter web uses /#/ hash
  # URLs, and with it clean paths need the Netlify SPA rewrite (F1). See
  # lib/core/router/app_router.dart.
  flutter_web_plugins:
    sdk: flutter
  url_launcher: ^6.2.5
  http: ^1.2.0
  supabase_flutter: 1.10.25
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  shared_preferences: ^2.2.3
  percent_indicator: ^4.2.3

dependency_overrides:
  app_links: ^3.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # CORRECTION: the previous theme set fontFamily 'Nunito' but neither bundled
  # the font nor depended on google_fonts, so it silently fell back to Roboto.
  # On Flutter web (CanvasKit) fonts loaded via CSS <link> are NOT used by the
  # renderer — fonts must be bundled here. Download the TTFs from
  # fonts.google.com into assets/fonts/ (Nunito for UI, IBM Plex Mono for the
  # data chips per spec A1/A4).
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
