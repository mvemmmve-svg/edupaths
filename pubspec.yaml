name: edupaths
description: Discover your future. Plan your path. Achieve your goals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Supabase - pinned to version compatible with app_links 3.x
  url_launcher: ^6.2.5
  http: ^1.2.0
  supabase_flutter: 1.10.25
  # UI
  google_fonts: 6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6
  # State & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  # Utils
  shared_preferences: ^2.2.3
  percent_indicator: ^4.2.3

# CRITICAL: Force app_links to 3.x to avoid build errors
dependency_overrides:
  app_links: ^3.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
